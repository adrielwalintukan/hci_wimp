<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodDesk — Carpenter Desktop</title>
    <meta name="description"
        content="A whimsical wooden desktop interface using a carpenter/woodworking metaphor for HCI design.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ═══════════════ CUSTOM CURSOR (nail) ═══════════════ -->
    <div id="nail-cursor">
        <svg viewBox="0 0 24 64" width="20" height="52">
            <!-- nail head -->
            <ellipse cx="12" cy="6" rx="10" ry="5" fill="#8a8a8a" stroke="#6a6a6a" stroke-width="1" />
            <ellipse cx="12" cy="5" rx="8" ry="3.5" fill="#b0b0b0" />
            <!-- nail shaft -->
            <rect x="10" y="10" width="4" height="44" rx="1" fill="#9e9e9e" stroke="#787878" stroke-width="0.5" />
            <rect x="11" y="10" width="1.5" height="44" rx="0.5" fill="#c4c4c4" opacity="0.4" />
            <!-- nail tip -->
            <polygon points="10,54 14,54 12,62" fill="#8a8a8a" />
        </svg>
    </div>

    <!-- ═══════════════ HAMMER (double-click effect) ═══════════════ -->
    <div id="hammer-effect" class="hidden">
        <svg viewBox="0 0 80 80" width="64" height="64">
            <!-- handle -->
            <rect x="36" y="40" width="8" height="38" rx="3" fill="#b07736" stroke="#8a5a20" stroke-width="1" />
            <rect x="38" y="40" width="3" height="38" rx="1" fill="#c9904a" opacity="0.5" />
            <!-- head -->
            <rect x="14" y="22" width="52" height="20" rx="4" fill="#7a7a7a" stroke="#5a5a5a" stroke-width="1.5" />
            <rect x="16" y="24" width="48" height="7" rx="2" fill="#9a9a9a" opacity="0.4" />
        </svg>
    </div>

    <!-- ═══════════════ CROWBAR / LINGGIS (close window effect) ═══════════════ -->
    <div id="crowbar-effect" class="hidden">
        <svg viewBox="0 0 90 90" width="72" height="72">
            <!-- crowbar shaft (long bar) -->
            <rect x="40" y="8" width="8" height="70" rx="3" fill="#5a5a5a" stroke="#444" stroke-width="1.2" />
            <!-- metallic highlight on shaft -->
            <rect x="42" y="10" width="3" height="66" rx="1.5" fill="#7a7a7a" opacity="0.4" />
            <!-- curved claw end (top) -->
            <path d="M36,14 Q30,4 22,8 Q18,10 20,16 L36,14 Z" fill="#5a5a5a" stroke="#444" stroke-width="1.2" />
            <!-- claw notch (V-shape for gripping nail) -->
            <path d="M22,8 L26,14 L20,14 Z" fill="#444" />
            <!-- claw highlight -->
            <path d="M34,13 Q30,6 24,9" fill="none" stroke="#7a7a7a" stroke-width="1" opacity="0.5" />
            <!-- flat chisel end (bottom) -->
            <rect x="37" y="76" width="14" height="5" rx="1.5" fill="#5a5a5a" stroke="#444" stroke-width="1" />
            <!-- bend near the top -->
            <rect x="36" y="12" width="16" height="6" rx="2" fill="#5a5a5a" stroke="#444" stroke-width="0.8" />
        </svg>
    </div>

    <!-- ═══════════════ MENU BAR (macOS style) ═══════════════ -->
    <nav id="menu-bar">

        <!-- Left: WoodDesk logo + menus -->
        <div class="menu-bar-left">
            <div class="menu-apple" title="WoodDesk">🪵</div>
            <div class="menu-item" data-menu="file">
                <span class="menu-label">File</span>
                <div class="menu-dropdown">
                    <div class="menu-option" data-action="new-window">New Window</div>
                    <div class="menu-option" data-action="new-folder">New Folder</div>
                    <div class="menu-divider"></div>
                    <div class="menu-option" data-action="close-all">Close All</div>
                </div>
            </div>
            <div class="menu-item" data-menu="tools">
                <span class="menu-label">Tools</span>
                <div class="menu-dropdown">
                    <div class="menu-option" data-action="open-workshop">Workshop</div>
                    <div class="menu-option" data-action="open-calculator">Ruler Calculator</div>
                    <div class="menu-option" data-action="open-notes">Notes</div>
                </div>
            </div>
            <div class="menu-item" data-menu="view">
                <span class="menu-label">View</span>
                <div class="menu-dropdown">
                    <div class="menu-option" data-action="arrange">Arrange Icons</div>
                    <div class="menu-option" data-action="refresh">Refresh Desktop</div>
                </div>
            </div>
            <div class="menu-item" data-menu="help">
                <span class="menu-label">Help</span>
                <div class="menu-dropdown">
                    <div class="menu-option" data-action="about">About WoodDesk</div>
                </div>
            </div>
        </div>

        <!-- Center: clock -->
        <div class="menu-bar-center">
            <div class="menu-clock" id="menu-clock"></div>
        </div>

        <!-- Right: macOS-style status icons -->
        <div class="menu-bar-right">
            <div class="status-icon" title="Brightness">
                <svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor">
                    <circle cx="10" cy="10" r="3.5" />
                    <line x1="10" y1="2" x2="10" y2="4.5" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="10" y1="15.5" x2="10" y2="18" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="2" y1="10" x2="4.5" y2="10" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="15.5" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="4.1" y1="4.1" x2="5.9" y2="5.9" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="14.1" y1="14.1" x2="15.9" y2="15.9" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="14.1" y1="5.9" x2="15.9" y2="4.1" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <line x1="4.1" y1="15.9" x2="5.9" y2="14.1" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                </svg>
            </div>
            <div class="status-icon" title="Volume">
                <svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor">
                    <polygon points="3,7 7,7 11,3 11,17 7,13 3,13" />
                    <path d="M13,7 Q16,10 13,13" fill="none" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                    <path d="M14.5,4.5 Q19,10 14.5,15.5" fill="none" stroke="currentColor" stroke-width="1.6"
                        stroke-linecap="round" />
                </svg>
            </div>
            <div class="status-icon" title="Wi-Fi Connected">
                <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor"
                    stroke-linecap="round">
                    <path d="M2,8 Q10,2 18,8" stroke-width="1.6" />
                    <path d="M5,11 Q10,7 15,11" stroke-width="1.6" />
                    <path d="M8,14 Q10,12 12,14" stroke-width="1.6" />
                    <circle cx="10" cy="17" r="1.2" fill="currentColor" />
                </svg>
            </div>
            <div class="status-icon" title="Battery 80%">
                <svg viewBox="0 0 22 12" width="22" height="14" fill="none">
                    <rect x="0.5" y="1.5" width="18" height="9" rx="2.5" stroke="currentColor" stroke-width="1.2" />
                    <rect x="2" y="3" width="12" height="6" rx="1.2" fill="currentColor" />
                    <path d="M19.5,4.5 L19.5,7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </div>
            <div class="status-icon status-icon--notif" id="notif-btn" title="Notifications">
                <svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor">
                    <path
                        d="M10,2 C7,2 5,4.5 5,7.5 L5,13 L3,14.5 L3,16 L17,16 L17,14.5 L15,13 L15,7.5 C15,4.5 13,2 10,2 Z" />
                    <path d="M8,16 Q8,19 12,19 Q12,19 12,16" fill="currentColor" />
                </svg>
            </div>
        </div>

    </nav>

    <!-- ═══════════════ DESKTOP AREA (wooden shelf) ═══════════════ -->
    <main id="desktop">

        <!-- ── DESKTOP CLOCK WIDGET (center) ── -->
        <div id="desktop-clock">
            <div id="desk-clock-time">00:00:00</div>
            <div id="desk-clock-date">Monday, 23 February 2026</div>
        </div>

        <!-- ── DESKTOP ICONS ── -->
        <div class="desktop-icons" id="desktop-icons">

            <!-- Folder: wooden box -->
            <div class="desktop-icon" data-type="folder" data-name="My Projects">
                <div class="icon-image">
                    <svg viewBox="0 0 64 56" width="56" height="48">
                        <rect x="2" y="12" width="60" height="42" rx="4" fill="#b07736" stroke="#8a5a20"
                            stroke-width="2" />
                        <rect x="4" y="14" width="56" height="38" rx="3" fill="#c9904a" />
                        <rect x="6" y="16" width="52" height="6" rx="2" fill="#dba660" />
                        <rect x="2" y="4" width="28" height="12" rx="4" fill="#b07736" stroke="#8a5a20"
                            stroke-width="2" />
                        <rect x="4" y="6" width="24" height="8" rx="3" fill="#c9904a" />
                        <!-- box latch -->
                        <rect x="26" y="30" width="12" height="4" rx="2" fill="#8a5a20" />
                        <circle cx="32" cy="32" r="2.5" fill="#6b4515" />
                    </svg>
                </div>
                <span class="icon-label">My Projects</span>
            </div>

            <!-- Folder: wooden box -->
            <div class="desktop-icon" data-type="folder" data-name="Documents">
                <div class="icon-image">
                    <svg viewBox="0 0 64 56" width="56" height="48">
                        <rect x="2" y="12" width="60" height="42" rx="4" fill="#a06828" stroke="#7a4e18"
                            stroke-width="2" />
                        <rect x="4" y="14" width="56" height="38" rx="3" fill="#bf8540" />
                        <rect x="6" y="16" width="52" height="6" rx="2" fill="#d4a050" />
                        <rect x="2" y="4" width="28" height="12" rx="4" fill="#a06828" stroke="#7a4e18"
                            stroke-width="2" />
                        <rect x="4" y="6" width="24" height="8" rx="3" fill="#bf8540" />
                        <rect x="26" y="30" width="12" height="4" rx="2" fill="#7a4e18" />
                        <circle cx="32" cy="32" r="2.5" fill="#5c3a10" />
                    </svg>
                </div>
                <span class="icon-label">Documents</span>
            </div>

            <!-- App: Hammer -->
            <div class="desktop-icon" data-type="app" data-name="Workshop">
                <div class="icon-image">
                    <svg viewBox="0 0 64 64" width="56" height="56">
                        <!-- handle -->
                        <rect x="28" y="30" width="8" height="30" rx="3" fill="#b07736" stroke="#8a5a20"
                            stroke-width="1.5" />
                        <rect x="30" y="30" width="3" height="30" rx="1" fill="#c9904a" opacity="0.5" />
                        <!-- head -->
                        <rect x="10" y="8" width="44" height="24" rx="5" fill="#7a7a7a" stroke="#5a5a5a"
                            stroke-width="2" />
                        <rect x="12" y="10" width="40" height="10" rx="3" fill="#9a9a9a" opacity="0.4" />
                    </svg>
                </div>
                <span class="icon-label">Workshop</span>
            </div>

            <!-- App: Saw -->
            <div class="desktop-icon" data-type="app" data-name="Saw Cutter">
                <div class="icon-image">
                    <svg viewBox="0 0 64 64" width="56" height="56">
                        <!-- blade -->
                        <path d="M8,40 L56,16 L58,20 L10,44 Z" fill="#b0b0b0" stroke="#888" stroke-width="1" />
                        <!-- teeth -->
                        <path
                            d="M10,44 L14,42 L12,46 L16,44 L14,48 L18,46 L16,50 L20,48 L18,52 L22,50 L20,54 L24,52 L22,56 L26,54"
                            fill="none" stroke="#888" stroke-width="1.5" />
                        <!-- handle -->
                        <rect x="44" y="10" width="16" height="14" rx="4" fill="#b07736" stroke="#8a5a20"
                            stroke-width="1.5" />
                        <rect x="46" y="12" width="12" height="10" rx="3" fill="#c9904a" />
                    </svg>
                </div>
                <span class="icon-label">Saw Cutter</span>
            </div>

            <!-- App: Ruler -->
            <div class="desktop-icon" data-type="app" data-name="Ruler Calculator">
                <div class="icon-image">
                    <svg viewBox="0 0 64 64" width="56" height="56">
                        <rect x="8" y="14" width="48" height="36" rx="3" fill="#d4a050" stroke="#a07030"
                            stroke-width="2" />
                        <rect x="10" y="16" width="44" height="32" rx="2" fill="#e6b868" />
                        <!-- ruler marks -->
                        <line x1="16" y1="16" x2="16" y2="28" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="22" y1="16" x2="22" y2="24" stroke="#8a5a20" stroke-width="1" />
                        <line x1="28" y1="16" x2="28" y2="28" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="34" y1="16" x2="34" y2="24" stroke="#8a5a20" stroke-width="1" />
                        <line x1="40" y1="16" x2="40" y2="28" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="46" y1="16" x2="46" y2="24" stroke="#8a5a20" stroke-width="1" />
                        <!-- numbers -->
                        <text x="15" y="36" font-size="7" fill="#6b4515" font-family="serif">1</text>
                        <text x="27" y="36" font-size="7" fill="#6b4515" font-family="serif">2</text>
                        <text x="39" y="36" font-size="7" fill="#6b4515" font-family="serif">3</text>
                    </svg>
                </div>
                <span class="icon-label">Ruler Calc</span>
            </div>

            <!-- App: Chisel -->
            <div class="desktop-icon" data-type="app" data-name="Notes">
                <div class="icon-image">
                    <svg viewBox="0 0 64 64" width="56" height="56">
                        <!-- blade -->
                        <polygon points="28,6 36,6 38,26 26,26" fill="#b0b0b0" stroke="#888" stroke-width="1" />
                        <polygon points="28,8 36,8 37,24 27,24" fill="#ccc" opacity="0.4" />
                        <!-- ferrule -->
                        <rect x="25" y="24" width="14" height="6" rx="1" fill="#8a8a8a" stroke="#666"
                            stroke-width="1" />
                        <!-- handle -->
                        <rect x="26" y="30" width="12" height="28" rx="4" fill="#b07736" stroke="#8a5a20"
                            stroke-width="1.5" />
                        <rect x="28" y="32" width="4" height="24" rx="2" fill="#c9904a" opacity="0.5" />
                    </svg>
                </div>
                <span class="icon-label">Notes</span>
            </div>

            <!-- App: Nails -->
            <div class="desktop-icon" data-type="app" data-name="About WoodDesk">
                <div class="icon-image">
                    <svg viewBox="0 0 64 64" width="56" height="56">
                        <!-- nail 1 -->
                        <ellipse cx="20" cy="10" rx="7" ry="3.5" fill="#999" stroke="#777" stroke-width="1" />
                        <rect x="18" y="12" width="4" height="36" rx="1" fill="#aaa" />
                        <polygon points="18,48 22,48 20,56" fill="#999" />
                        <!-- nail 2 -->
                        <ellipse cx="40" cy="16" rx="7" ry="3.5" fill="#999" stroke="#777" stroke-width="1" />
                        <rect x="38" y="18" width="4" height="30" rx="1" fill="#aaa" />
                        <polygon points="38,48 42,48 40,54" fill="#999" />
                        <!-- nail 3 -->
                        <ellipse cx="30" cy="22" rx="6" ry="3" fill="#999" stroke="#777" stroke-width="1" />
                        <rect x="28" y="24" width="4" height="26" rx="1" fill="#aaa" />
                        <polygon points="28,50 32,50 30,56" fill="#999" />
                    </svg>
                </div>
                <span class="icon-label">About</span>
            </div>
        </div>

        <!-- ── WINDOWS rendered by JS ── -->
        <div id="windows-container"></div>
    </main>

    <!-- ═══════════════ BOTTOM DOCK ═══════════════ -->
    <footer id="taskbar">

        <!-- LEFT: Weather widget -->
        <div id="dock-weather">
            <div id="dock-weather-icon">⛅</div>
            <div id="dock-weather-info">
                <span id="dock-weather-temp">28°C</span>
                <span id="dock-weather-desc">Cerah</span>
            </div>
        </div>

        <!-- CENTER: Pinned app icons -->
        <div id="dock-center">
            <div class="dock-pin" data-action="open-workshop" title="Workshop">
                <div class="dock-pin-img">
                    <svg viewBox="0 0 48 48" width="32" height="32">
                        <rect x="4" y="14" width="40" height="16" rx="4" fill="#7a7a7a" />
                        <rect x="6" y="16" width="36" height="6" rx="2" fill="#9e9e9e" opacity="0.5" />
                        <rect x="19" y="30" width="10" height="14" rx="2" fill="#b07736" />
                    </svg>
                </div>
                <div class="dock-pin-label">Workshop</div>
                <div class="dock-pin-dot"></div>
            </div>

            <div class="dock-pin" data-action="open-calculator" title="Ruler Calc">
                <div class="dock-pin-img">
                    <svg viewBox="0 0 48 48" width="32" height="32">
                        <rect x="4" y="10" width="40" height="28" rx="4" fill="#d4a050" stroke="#a07030"
                            stroke-width="1.5" />
                        <rect x="6" y="12" width="36" height="24" rx="3" fill="#e6b868" />
                        <line x1="12" y1="12" x2="12" y2="22" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="20" y1="12" x2="20" y2="22" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="28" y1="12" x2="28" y2="22" stroke="#8a5a20" stroke-width="1.5" />
                        <line x1="36" y1="12" x2="36" y2="22" stroke="#8a5a20" stroke-width="1.5" />
                    </svg>
                </div>
                <div class="dock-pin-label">Ruler Calc</div>
                <div class="dock-pin-dot"></div>
            </div>

            <div class="dock-pin" data-action="open-notes" title="Notes">
                <div class="dock-pin-img">
                    <svg viewBox="0 0 48 48" width="32" height="32">
                        <rect x="8" y="4" width="32" height="40" rx="3" fill="#f5e6c8" stroke="#c9a060"
                            stroke-width="1.5" />
                        <line x1="14" y1="14" x2="34" y2="14" stroke="#a07030" stroke-width="1.5" />
                        <line x1="14" y1="20" x2="34" y2="20" stroke="#c9a060" />
                        <line x1="14" y1="26" x2="28" y2="26" stroke="#c9a060" />
                        <line x1="14" y1="32" x2="30" y2="32" stroke="#c9a060" />
                    </svg>
                </div>
                <div class="dock-pin-label">Notes</div>
                <div class="dock-pin-dot"></div>
            </div>

            <div class="dock-pin" data-action="about" title="About">
                <div class="dock-pin-img">
                    <svg viewBox="0 0 48 48" width="32" height="32">
                        <circle cx="24" cy="24" r="20" fill="#8a5a20" />
                        <circle cx="24" cy="24" r="17" fill="#b07736" />
                        <text x="24" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#f5e0b0"
                            font-family="serif">i</text>
                    </svg>
                </div>
                <div class="dock-pin-label">About</div>
                <div class="dock-pin-dot"></div>
            </div>

            <div class="dock-separator"></div>
            <!-- Running app buttons inserted by JS -->
            <div id="taskbar-items"></div>
        </div>

    </footer>

    <script src="app.js"></script>
</body>

</html>
